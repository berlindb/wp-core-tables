name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:
    inputs:
      core_ref:
        description: 'berlindb/core ref to test against'
        default: 'master'
  # Fired by berlindb/core on push to master (the cross-repo canary).
  repository_dispatch:
    types: [ core-updated ]

jobs:
  phpunit:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }} / core ${{ needs.resolve.outputs.ref }}
    runs-on: ubuntu-latest
    needs: resolve

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]
        wp:  [ '6.6', 'latest' ]

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Checkout berlindb/core @ ${{ needs.resolve.outputs.ref }}
        uses: actions/checkout@v6
        with:
          repository: berlindb/core
          ref: ${{ needs.resolve.outputs.ref }}
          path: berlindb-core

      - name: Normalize core to a master branch
        # The composer `path` repo derives its version from the checked-out branch.
        # A branch ref (push CI) lands on `master` and advertises dev-master, which
        # satisfies the `berlindb/core: dev-master` requirement - but the canary checks
        # out an exact SHA (detached HEAD), which advertises no such version and breaks
        # resolution. Force a local master branch at whatever was checked out.
        run: git -C berlindb-core checkout -B master

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli
          tools: composer
          coverage: none

      - name: Point composer at the checked-out core
        run: composer config repositories.berlindb-core path ./berlindb-core

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Use mysql_native_password auth
        # MySQL 8 defaults root to caching_sha2_password, whose first-time auth needs
        # a secure connection; PHP's mysqli connects to the service over plain TCP and
        # fails with "Authentication requires secure connection". Native password auth
        # has no such requirement. --get-server-public-key lets this one ALTER complete
        # caching_sha2 auth over the non-TLS connection (fetching the RSA key) so the
        # switch can be made in the first place.
        run: mysql -h 127.0.0.1 -P 3306 -u root -proot --ssl-mode=DISABLED --get-server-public-key -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root';"

      - name: Install subversion
        # The WP test-suite installer fetches tests/phpunit via `svn export`, and the
        # ubuntu-latest runner image no longer ships subversion.
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 ${{ matrix.wp }}

      - name: PHPUnit
        run: composer test

  resolve:
    name: Resolve core ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pick.outputs.ref }}
    steps:
      - id: pick
        run: |
          REF="${{ github.event.client_payload.sha || github.event.inputs.core_ref || 'master' }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Testing against berlindb/core @ $REF"
